<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Robot Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }

  #face-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  #face-container img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    transition: opacity 0.05s ease-in-out;
  }

  #img-a { opacity: 1; }
  #img-b { opacity: 0; }

  #status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  #status.connected { background: #00ff88; }
  #status.error { background: #ff3333; }
</style>
</head>
<body>

<div id="face-container">
  <img id="img-a" src="" alt="">
  <img id="img-b" src="" alt="">
</div>
<div id="status"></div>
<audio id="audio-player" preload="auto"></audio>

<script>
  // =============================================
  // CONFIG
  // =============================================
  const FUNCTION_URL = 'https://spraxnqjbsmfdmqodfxk.supabase.co/functions/v1/robot-controller';
  const IMAGE_BASE = './images/';
  const AUDIO_BASE = './audio/';
  const ANIM_SPEED = 400;
  const POLL_INTERVAL = 500;
  // =============================================

  const imgA = document.getElementById('img-a');
  const imgB = document.getElementById('img-b');
  const status = document.getElementById('status');
  const audioPlayer = document.getElementById('audio-player');

  let currentFace = 'Neutral';
  let showingA = true;
  let animInterval = null;
  let lastVoiceline = null;
  let lastUpdated = null;
  let wakeLock = null;

  // Wake Lock
  async function requestWakeLock() {
    try {
      if (wakeLock) return;
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch(e) {}
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // Face animation
  function setFace(face) {
    if (face === currentFace) return;
    currentFace = face;

    clearInterval(animInterval);

    // Schwarzer Screen
    if (face === 'Off') {
      imgA.style.opacity = '0';
      imgB.style.opacity = '0';
      return;
    }

    const src1 = IMAGE_BASE + face + '1.png';
    const src2 = IMAGE_BASE + face + '2.png';

    if (showingA) {
      imgA.src = src1; imgB.src = src2;
      imgA.style.opacity = '1'; imgB.style.opacity = '0';
    } else {
      imgB.src = src1; imgA.src = src2;
      imgB.style.opacity = '1'; imgA.style.opacity = '0';
    }

    animInterval = setInterval(() => {
      if (showingA) {
        imgA.style.opacity = '0'; imgB.style.opacity = '1';
      } else {
        imgB.style.opacity = '0'; imgA.style.opacity = '1';
      }
      showingA = !showingA;
    }, ANIM_SPEED);
  }

  function playVoiceline(file) {
    if (!file) return;
    const cleanFile = file.split('?')[0];
    // Stoppen falls noch was läuft
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
    audioPlayer.src = AUDIO_BASE + cleanFile;
    // Kurz warten dann abspielen (iOS braucht das)
    setTimeout(() => {
      audioPlayer.play().catch(e => console.log('Audio error:', e));
    }, 50);
  }

  // Polling
  async function poll() {
    try {
      const res = await fetch(FUNCTION_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      status.className = 'connected';
      if (data.face) setFace(data.face);
      // updated_at vergleichen um doppeltes Abspielen zu verhindern
      if (data.voiceline && data.updated_at && data.updated_at !== lastUpdated) {
        lastUpdated = data.updated_at;
        lastVoiceline = data.voiceline;
        playVoiceline(data.voiceline);
      }
    } catch(e) {
      status.className = 'error';
    }
  }

  // Einmaliger Tap zum Audio-Freischalten (Browser-Pflicht)
  document.body.addEventListener('click', () => {
    audioPlayer.play().catch(() => {});
    audioPlayer.pause();
  }, { once: true });

  setFace('Neutral');
  requestWakeLock();
  poll();
  setInterval(poll, POLL_INTERVAL);
</script>
</body>
</html>
