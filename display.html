<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }

  #face-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  #face-container img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    transition: opacity 0.05s ease-in-out;
  }

  #img-a { opacity: 1; }
  #img-b { opacity: 0; }

  #status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  #status.connected { background: #00ff88; }
  #status.error { background: #ff3333; }
</style>
</head>
<body>

<div id="face-container">
  <img id="img-a" src="" alt="">
  <img id="img-b" src="" alt="">
</div>
<div id="status"></div>

<!-- Audio element -->
<audio id="audio-player" preload="auto"></audio>

<script>
  // =============================================
  // CONFIG — hier deine Supabase-Daten eintragen
  // =============================================
  const SUPABASE_URL = 'https://spraxnqjbsmfdmqodfxk.supabase.co/';
  const SUPABASE_ANON_KEY = 'sb_publishable_rE_ROSTEzj_vyekfwR1BvQ_44ZAxcTE';

  // Pfad zu deinen Bildern (relativ oder absolut)
  // Dateinamen müssen exakt so heißen: Talk1.png, Talk2.png, Sad1.png etc.
  const IMAGE_BASE = './images/';
  const AUDIO_BASE = './audio/';

  // Animationsgeschwindigkeit in ms (wie schnell Bild 1 ↔ Bild 2 wechselt)
  const ANIM_SPEED = 400;

  // =============================================

  const imgA = document.getElementById('img-a');
  const imgB = document.getElementById('img-b');
  const status = document.getElementById('status');
  const audioPlayer = document.getElementById('audio-player');

  let currentFace = 'Neutral';
  let showingA = true;
  let animInterval = null;

  function setFace(face) {
    if (face === currentFace) return;
    currentFace = face;

    // Bilder vorladen
    const src1 = IMAGE_BASE + face + '1.png';
    const src2 = IMAGE_BASE + face + '2.png';

    clearInterval(animInterval);

    if (showingA) {
      imgA.src = src1;
      imgB.src = src2;
    } else {
      imgB.src = src1;
      imgA.src = src2;
    }

    // Animation starten
    animInterval = setInterval(() => {
      if (showingA) {
        imgA.style.opacity = '0';
        imgB.style.opacity = '1';
      } else {
        imgB.style.opacity = '0';
        imgA.style.opacity = '1';
      }
      showingA = !showingA;
    }, ANIM_SPEED);
  }

  function playVoiceline(file) {
    if (!file) return;
    audioPlayer.src = AUDIO_BASE + file;
    audioPlayer.play().catch(e => console.log('Audio error:', e));
  }

  // =============================================
  // Supabase Realtime
  // =============================================
  async function connect() {
    // Aktuellen State holen
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/robot_state?select=*&order=id.desc&limit=1`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        }
      });
      const data = await res.json();
      if (data && data[0]) {
        setFace(data[0].face || 'Neutral');
      }
    } catch(e) {
      console.log('Fetch error:', e);
    }

    // Realtime subscription via WebSocket
    const wsUrl = SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_ANON_KEY + '&vsn=1.0.0';
    const ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      status.className = 'connected';
      // Join realtime channel
      ws.send(JSON.stringify({
        topic: 'realtime:public:robot_state',
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, presence: { key: '' } } },
        ref: '1'
      }));
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.event === 'postgres_changes' || (msg.payload && msg.payload.data)) {
          const record = msg.payload?.data?.record || msg.payload?.record;
          if (record) {
            if (record.face) setFace(record.face);
            if (record.voiceline) playVoiceline(record.voiceline);
          }
        }
        // Heartbeat
        if (msg.event === 'heartbeat') {
          ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: null }));
        }
      } catch(e) {}
    };

    ws.onerror = () => { status.className = 'error'; };
    ws.onclose = () => {
      status.className = 'error';
      // Reconnect nach 3s
      setTimeout(connect, 3000);
    };

    // Heartbeat senden
    setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: null }));
      }
    }, 25000);
  }

  // Warten auf User-Interaction (iOS braucht das für Audio)
  document.body.addEventListener('click', () => {
    audioPlayer.play().catch(() => {});
    audioPlayer.pause();
  }, { once: true });

  // Neutrales Gesicht beim Start
  setFace('Neutral');
  connect();
</script>
</body>
</html>
