<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }

  #face-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  #face-container img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    transition: opacity 0.05s ease-in-out;
  }

  #img-a { opacity: 1; }
  #img-b { opacity: 0; }

  #status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  #status.connected { background: #00ff88; }
  #status.error { background: #ff3333; }

  /* Tap-to-start overlay */
  #tap-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 50;
    cursor: pointer;
  }

  #tap-overlay span {
    font-family: 'Courier New', monospace;
    color: #333;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  #tap-overlay .icon { font-size: 48px; }
</style>
</head>
<body>

<!-- Tap-to-start (nötig für iOS Audio + Fullscreen) -->
<div id="tap-overlay">
  <span class="icon">🤖</span>
  <span>Antippen zum Starten</span>
</div>

<div id="face-container">
  <img id="img-a" src="" alt="">
  <img id="img-b" src="" alt="">
</div>
<div id="status"></div>
<audio id="audio-player" preload="auto"></audio>

<script>
  // =============================================
  // CONFIG — nur diese Zeilen anpassen
  // =============================================
  const FUNCTION_URL = 'https://spraxnqjbsmfdmqodfxk.supabase.co/functions/v1/robot-controller';

  const IMAGE_BASE = './images/';
  const AUDIO_BASE = './audio/';
  const ANIM_SPEED = 400;
  // =============================================

  const imgA = document.getElementById('img-a');
  const imgB = document.getElementById('img-b');
  const status = document.getElementById('status');
  const audioPlayer = document.getElementById('audio-player');
  const tapOverlay = document.getElementById('tap-overlay');

  let currentFace = 'Neutral';
  let showingA = true;
  let animInterval = null;
  let lastVoiceline = null;
  let lastUpdated = null;
  let wakeLock = null;

  // =============================================
  // Wake Lock — verhindert Sleep
  // =============================================
  async function requestWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake Lock aktiv');
    } catch(e) {
      console.log('Wake Lock nicht verfügbar:', e);
    }
  }

  // Wake Lock neu anfordern wenn Tab wieder sichtbar wird
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // =============================================
  // Fullscreen
  // =============================================
  async function enterFullscreen() {
    try {
      const el = document.documentElement;
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
    } catch(e) {
      console.log('Fullscreen nicht verfügbar:', e);
    }
  }

  // =============================================
  // Tap-to-start
  // =============================================
  tapOverlay.addEventListener('click', async () => {
    // Audio aktivieren (iOS)
    audioPlayer.play().catch(() => {});
    audioPlayer.pause();

    // Fullscreen
    await enterFullscreen();

    // Wake Lock
    await requestWakeLock();

    // Overlay ausblenden
    tapOverlay.style.display = 'none';
  }, { once: true });

  // =============================================
  // Face animation
  // =============================================
  function setFace(face) {
    if (face === currentFace) return;
    currentFace = face;

    const src1 = IMAGE_BASE + face + '1.png';
    const src2 = IMAGE_BASE + face + '2.png';

    clearInterval(animInterval);

    if (showingA) {
      imgA.src = src1;
      imgB.src = src2;
    } else {
      imgB.src = src1;
      imgA.src = src2;
    }

    animInterval = setInterval(() => {
      if (showingA) {
        imgA.style.opacity = '0';
        imgB.style.opacity = '1';
      } else {
        imgB.style.opacity = '0';
        imgA.style.opacity = '1';
      }
      showingA = !showingA;
    }, ANIM_SPEED);
  }

  function playVoiceline(file) {
    if (!file || file === lastVoiceline) return;
    lastVoiceline = file;
    const cleanFile = file.split('?')[0];
    audioPlayer.src = AUDIO_BASE + cleanFile;
    audioPlayer.play().catch(e => console.log('Audio error:', e));
  }

  // =============================================
  // Polling
  // =============================================
  async function poll() {
    try {
      const res = await fetch(FUNCTION_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      status.className = 'connected';

      if (data.face) setFace(data.face);

      if (data.voiceline && data.updated_at !== lastUpdated) {
        lastUpdated = data.updated_at;
        playVoiceline(data.voiceline);
      }
    } catch(e) {
      status.className = 'error';
      console.log('Poll error:', e);
    }
  }

  setFace('Neutral');
  poll();
  setInterval(poll, 500);
</script>
</body>
</html>
