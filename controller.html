<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Controller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 32px 24px;
  }

  /* Password screen */
  #lock-screen {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  #lock-screen h2 {
    font-size: 14px;
    letter-spacing: 0.2em;
    color: #555;
    text-transform: uppercase;
  }

  #lock-screen input {
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    padding: 12px 20px;
    text-align: center;
    width: 240px;
    outline: none;
  }

  #lock-screen input:focus { border-color: #555; }

  #lock-screen button {
    background: #00ff88;
    border: none;
    border-radius: 6px;
    color: #000;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 12px 32px;
    text-transform: uppercase;
  }

  #lock-error {
    color: #ff3333;
    font-size: 12px;
    min-height: 16px;
  }

  /* Main UI */
  #main { display: none; }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .robot-icon { font-size: 32px; }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
  }

  .conn-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
    margin-left: auto;
    transition: background 0.3s;
  }
  .conn-dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff8866; }
  .conn-dot.error { background: #ff3333; }

  section { margin-bottom: 36px; }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 14px;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }

  .face-btn {
    background: #111118;
    border: 1px solid #222;
    border-radius: 8px;
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 18px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .face-btn .emoji { display: block; font-size: 28px; margin-bottom: 6px; }
  .face-btn:hover { border-color: #444; background: #18181f; color: #fff; }

  @keyframes pulse-border {
    0% { box-shadow: 0 0 12px #00ff8822; }
    50% { box-shadow: 0 0 20px #00ff8844; }
    100% { box-shadow: 0 0 12px #00ff8822; }
  }

  .face-btn.active {
    border-color: #00ff88;
    background: #001a0e;
    color: #00ff88;
    animation: pulse-border 2s infinite;
  }

  .voice-btn {
    background: #0f0f1a;
    border: 1px solid #1a1a33;
    border-radius: 8px;
    color: #8888cc;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .voice-btn .emoji { display: block; font-size: 22px; margin-bottom: 5px; }
  .voice-btn:hover { border-color: #3333aa; background: #141425; color: #aaaaff; }
  .voice-btn.playing {
    border-color: #6666ff;
    background: #0d0d22;
    color: #9999ff;
    box-shadow: 0 0 10px #6666ff33;
  }

  .status-bar {
    margin-top: 40px;
    padding: 12px 16px;
    background: #0d0d14;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    font-size: 11px;
    color: #444;
    letter-spacing: 0.05em;
  }
  .status-bar span { color: #666; }
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock-screen">
  <span style="font-size:40px">🤖</span>
  <h2>Robot Controller</h2>
  <input type="password" id="pw-input" placeholder="Passwort" autofocus>
  <div id="lock-error"></div>
  <button onclick="unlock()">Entsperren</button>
</div>

<!-- Main UI -->
<div id="main">
  <header>
    <span class="robot-icon">🤖</span>
    <h1>Robot Controller</h1>
    <div class="conn-dot" id="conn-dot"></div>
  </header>

  <section>
    <div class="section-label">Gesichtsausdruck</div>
    <div class="btn-grid" id="face-buttons"></div>
  </section>

  <section>
    <div class="section-label">Voicelines</div>
    <div class="btn-grid" id="voice-buttons"></div>
  </section>

  <div class="status-bar">
    Aktiv: <span id="status-face">—</span> &nbsp;|&nbsp; Letzte Aktion: <span id="status-time">—</span>
  </div>
</div>

<script>
  // =============================================
  // CONFIG — nur diese Zeile anpassen
  // =============================================
  const FUNCTION_URL = 'https://spraxnqjbsmfdmqodfxk.supabase.co/functions/v1/robot-controller';

  const FACES = [
    { name: 'Talk',    emoji: '💬' },
    { name: 'Happy',   emoji: '😊' },
    { name: 'Neutral', emoji: '😐' },
    { name: 'Serious', emoji: '😤' },
    { name: 'Sad',     emoji: '😢' },
  ];

const VOICELINES = [
  { label: '67',            emoji: '🔊', file: '67.mp3' },
  { label: 'Hallo',         emoji: '👋', file: 'hallo.mp3' },
  { label: 'Herz',          emoji: '❤️',  file: 'herz.mp3' },
  { label: 'Tanz',          emoji: '💃', file: 'Tanz.mp3' },
  { label: 'Verabschiedung',emoji: '👋', file: 'Verabschiedung.mp3' },
  { label: 'Wie helfen',    emoji: '🤝', file: 'wieHelfen.mp3' },
  { label: 'Atemuebung',     emoji: '🌬️', file: 'Atemuebung.mp3' },
  { label: 'Voice',         emoji: '🔊', file: 'voice.mp3' },
];
  // =============================================

  let password = '';
  let activeFace = null;

  // Password input — Enter zum Entsperren
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });

  async function unlock() {
    const input = document.getElementById('pw-input').value;
    const lockError = document.getElementById('lock-error');

    // Passwort testen indem wir einen POST schicken
    try {
      const res = await fetch(FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-controller-password': input
        },
        body: JSON.stringify({ face: null })
      });

      if (res.status === 401) {
        lockError.textContent = 'Falsches Passwort';
        return;
      }

      password = input;
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      init();
    } catch(e) {
      lockError.textContent = 'Verbindungsfehler';
    }
  }

  function init() {
    const connDot = document.getElementById('conn-dot');
    const statusFace = document.getElementById('status-face');
    const statusTime = document.getElementById('status-time');

    // Gesichts-Buttons
    const faceGrid = document.getElementById('face-buttons');
    FACES.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'face-btn';
      btn.id = 'face-' + f.name;
      btn.innerHTML = `<span class="emoji">${f.emoji}</span>${f.name}`;
      btn.onclick = () => sendFace(f.name);
      faceGrid.appendChild(btn);
    });

    // Voiceline-Buttons
    const voiceGrid = document.getElementById('voice-buttons');
    VOICELINES.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'voice-btn';
      btn.innerHTML = `<span class="emoji">${v.emoji}</span>${v.label}`;
      btn.onclick = () => sendVoice(v.file, btn);
      voiceGrid.appendChild(btn);
    });

    async function sendFace(name) {
      if (activeFace) document.getElementById('face-' + activeFace)?.classList.remove('active');
      activeFace = name;
      document.getElementById('face-' + name)?.classList.add('active');
      statusFace.textContent = name;
      statusTime.textContent = new Date().toLocaleTimeString();

      try {
        const res = await fetch(FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-controller-password': password
          },
          body: JSON.stringify({ face: name, voiceline: null })
        });
        connDot.className = 'conn-dot ' + (res.ok ? 'connected' : 'error');
      } catch(e) {
        connDot.className = 'conn-dot error';
      }
    }

    async function sendVoice(file, btn) {
      btn.classList.add('playing');
      setTimeout(() => btn.classList.remove('playing'), 1000);
      statusTime.textContent = new Date().toLocaleTimeString();

      try {
        const res = await fetch(FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-controller-password': password
          },
          body: JSON.stringify({ voiceline: file })
        });
        connDot.className = 'conn-dot ' + (res.ok ? 'connected' : 'error');
      } catch(e) {
        connDot.className = 'conn-dot error';
      }
    }

    // Verbindungscheck
    async function checkConn() {
      try {
        const res = await fetch(FUNCTION_URL);
        connDot.className = 'conn-dot ' + (res.ok ? 'connected' : 'error');
      } catch(e) {
        connDot.className = 'conn-dot error';
      }
    }
    checkConn();
    setInterval(checkConn, 10000);
  }
</script>

</body>
</html>
